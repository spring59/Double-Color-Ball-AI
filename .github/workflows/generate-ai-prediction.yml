name: Generate AI Prediction

on:
  # 1. 定时触发：北京时间每周二、四、日 17:30 运行（对应 UTC 09:30）
  schedule:
    - cron: '30 9 * * 2,4,0'

  # 2. 手动触发：支持在 GitHub Actions 界面手动点击运行
  workflow_dispatch:

  # 3. 新增推送触发：当向 my_color 分支推送代码（或者合并 PR）时自动触发
  push:
    branches:
      - my_color

jobs:
  generate-prediction:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # 🌟 全局设置时区为北京时间
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run lottery data fetcher
        run: |
          cd fetch_history
          python3 fetch_lottery_history.py
      - name: Run AI prediction generator
        run: python3 generate_ai_prediction.py
        env:
          SSQ_AI_BASE_URL: ${{ secrets.SSQ_AI_BASE_URL }}
          SSQ_AI_API_KEY: ${{ secrets.SSQ_AI_API_KEY }}
          SSQ_PUSH_PLUS_TOKEN: ${{ secrets.SSQ_PUSH_PLUS_TOKEN }}
          SSQ_BA_ZI: ${{ secrets.SSQ_BA_ZI }}

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Summary
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "✅ AI predictions generated successfully" >> $GITHUB_STEP_SUMMARY
          echo "Generated at: $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.check_changes.outputs.changed != 'true'
        run: |
          echo "ℹ️ No changes in prediction data" >> $GITHUB_STEP_SUMMARY